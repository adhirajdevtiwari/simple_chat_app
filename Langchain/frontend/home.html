<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scrimba Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <div class="header">
      <div class="header-left">
        <div class="logo"><span class="logo-icon">✦</span> SCRIMBA</div>
        <div class="subtitle">Knowledge Base Assistant</div>
      </div>
      <div class="status">
        <div class="dot"></div>
        <span class="status-label">online</span>
      </div>
    </div>

    <div id="chatbot-conversation-container"></div>

    <form id="chat-form" class="input-row">
      <input
        type="text"
        id="user-input"
        placeholder="Ask me anything..."
        autocomplete="off"
      />
      <button type="submit" id="send-btn" aria-label="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
          <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
        </svg>
      </button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
